# NTPsec oracle test configuration
# Used by both real ntpd and ntpd-rs for behavioral comparison

# Local clock (for isolated test environments)
server 127.127.1.0 prefer
fudge 127.127.1.0 stratum 10

# Pool servers (commented out in CI; uncomment for integration tests)
# pool pool.ntp.org iburst

# Security
restrict -4 default kod limited nomodify notrap nopeer
restrict -6 default kod limited nomodify notrap nopeer
restrict 127.0.0.1
restrict ::1

# Drift file
driftfile /var/lib/ntp/ntp.drift

# Statistics
statsdir /var/log/ntpstats/
statistics loopstats peerstats clockstats
filegen loopstats file loopstats type day enable
filegen peerstats file peerstats type day enable
filegen clockstats file clockstats type day enable
